[theme]
base = "dark"
primaryColor = "#5575ff"
backgroundColor = "#0B0B14"
secondaryBackgroundColor = "#16162A"
textColor = "#E8EDF4"
font = "sans serif"

[server]
# Server configuration
port = 8501
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200

# Performance optimizations
runOnSave = true
allowRunOnSave = true

[browser]
# Browser settings
gatherUsageStats = false
serverAddress = "localhost"

[runner]
# Runner configuration for better performance
magicEnabled = true
fastReruns = true

[client]
# Client settings
showErrorDetails = true
toolbarMode = "minimal"

[ui]
# Hide default Streamlit elements for cleaner look
hideTopBar = false